<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Pokédex</h1>

        <div class="search-box">
            <input type="text" id="pokemon" placeholder="Digite o nome do Pokémon">
            <button id="buscar">Buscar</button>
        </div>

        <div class="card">

            <img id="pokemon-img" src="" alt="Pokemon">

            <h2 id="pokemon-name">Nome</h2>

            <div class="info">
                <p><strong>ID:</strong> <span id="pokemon-id">0</span></p>
                <p><strong>Tipo:</strong> <span id="pokemon-type">-</span></p>
                <p><strong>Altura:</strong> <span id="pokemon-height">-</span></p>
                <p><strong>Peso:</strong> <span id="pokemon-weight">-</span></p>
            </div>

        </div>

    </div>

</body>
</html>
